<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monod Quiz</title>
<link rel="icon" href="/static/favicon.ico" type="image/x-icon">
<link rel="stylesheet" href="/static/css/login.css">
</head>
<body>

<div class="blob blob-blue" id="blobBlue"></div>
<div class="blob blob-purple" id="blobPurple"></div>
<div class="blob blob-center" id="blobCenter"></div>
<div class="dot dot-pink" id="dotPink"></div>
<div class="dot dot-yellow" id="dotYellow"></div>
<div class="dot dot-purple" id="dotPurple"></div>
<div class="plus plus-left" id="plusLeft">+</div>
<div class="plus plus-right" id="plusRight">+</div>

<header class="header" id="header">
  <div class="logo-wrap">
    <img src="/static/logo.svg" alt="Logo Collège Théodore Monod" onerror="this.style.display='none'; document.querySelector('.logo-fallback').style.display='flex'">
    <div class="logo-fallback">M</div>
  </div>
  <div class="title-block">
    <h1>Monod Quiz</h1>
    <p>Choisis ton thème <span class="subtitle-extra">et joue !</span></p>
  </div>
</header>

<main class="arena">
  <div class="cards-scene">
    <div class="theme-card card-tl" id="cardTL"></div>
    <div class="theme-card card-tr" id="cardTR"></div>
    <div class="theme-card card-bl" id="cardBL"></div>
    <div class="theme-card card-br" id="cardBR"></div>

    <div class="halo-btn" id="haloBtn">
      <div class="play-btn" id="playBtn" onclick="ouvrirModal()">
        <div class="play-inner">
          <div class="play-icon"></div>
        </div>
      </div>
    </div>
  </div>
</main>

<footer class="bottom-hint" id="bottomHint">Appuyer pour commencer</footer>

<div class="modal-overlay" id="overlay" onclick="fermerSiDehors(event)">
  <div class="modal" id="modalContent"></div>
</div>

<script src="/static/js/login.js"></script>
</body>
</html>
